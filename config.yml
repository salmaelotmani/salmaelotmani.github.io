  profileMode:
    enabled: true
    title: Salma El Otmani
    subtitle: "I am a PhD student in Computer Science at the University of Illinois Urbana-Champaign. My research examines how novice programmers use and learn with large language models, with a focus on API learning, prompting, and computing education.\n\nI am advised by [Prof. Katie Cunningham](https://www.kicunningham.com/) and am a member of the [TRAILS Lab](https://trailslab.web.illinois.edu/)."
    imageUrl: "Mypicture.jpeg"
    imageWidth: 330
    imageHeight: 250

