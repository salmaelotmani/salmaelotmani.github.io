      url: cv.pdf
    - name: Google Scholar
      url: https://scholar.google.com/citations?user=gnAVZWAAAAAJ&hl=en&oi=ao
    - name: LinkedIn
      url: https://linkedin.com/in/salma-e-71769725a
    - name: GitHub
      url: https://github.com/salmaelotmani

